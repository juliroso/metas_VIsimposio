<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Metas do Evento</title>
    <style>
        :root {
            /* Cores puxadas da identidade visual do seu jogo */
            --bg-color: #0b0b3b; 
            --text-color: #ffffff;
            --accent-color: #f39c12; 
            
            /* Cores das barras do dashboard adaptadas para o fundo escuro */
            --color-ingressos: #3498db;      
            --color-patrocinadores: #f39c12;  
            --color-parceiros: #9b59b6;      
            --color-posts: #1abc9c;          
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            
            /* Puxando a imagem local exatamente como estava no seu código do jogo */
            background-image: url('irradfundo.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
        }

        /* Container amplo para não esmagar no PC */
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Cabeçalho com o visual do jogo */
        .header {
            text-align: center;
            margin-bottom: 40px;
            background: rgba(11, 11, 59, 0.85);
            backdrop-filter: blur(8px);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header img {
            max-width: 150px;
            margin-bottom: 15px;
        }

        h1 {
            color: var(--accent-color);
            font-size: 2.2em;
            margin: 0 0 5px 0;
        }

        .subtitle {
            font-size: 1em;
            color: #ccc;
        }

        /* Grid do Dashboard restaurado para funcionar bem em telas grandes */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
        }

        /* Cards com o efeito de vidro do jogo */
        .card {
            background: rgba(11, 11, 59, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card h3 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            color: var(--text-color);
        }

        .status-text {
            font-size: 0.95rem;
            color: #ccc;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .status-text span {
            color: var(--accent-color); 
            font-size: 1.2rem;
        }

        /* Barra de progresso com o fundo translúcido do jogo */
        .progress-bar-bg {
            width: 100%;
            height: 12px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 0%; 
            border-radius: 10px;
            transition: width 1s ease-in-out;
        }

        .fill-ingressos { background-color: var(--color-ingressos); }
        .fill-patrocinadores { background-color: var(--color-patrocinadores); }
        .fill-parceiros { background-color: var(--color-parceiros); }
        .fill-posts { background-color: var(--color-posts); }

        .percentage {
            text-align: right;
            font-size: 0.9rem;
            font-weight: bold;
            margin-top: 8px;
            color: var(--text-color);
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="dashboard-grid">
            
            <div class="card">
                <div>
                    <h3>Venda de Ingressos</h3>
                    <div class="status-text"><span id="txt-ingressos">0</span> / 100</div>
                </div>
                <div>
                    <div class="progress-bar-bg">
                        <div class="progress-fill fill-ingressos" id="bar-ingressos"></div>
                    </div>
                    <div class="percentage" id="perc-ingressos">0%</div>
                </div>
            </div>

            <div class="card">
                <div>
                    <h3>Patrocinadores</h3>
                    <div class="status-text"><span id="txt-patrocinadores">0</span> / 7</div>
                </div>
                <div>
                    <div class="progress-bar-bg">
                        <div class="progress-fill fill-patrocinadores" id="bar-patrocinadores"></div>
                    </div>
                    <div class="percentage" id="perc-patrocinadores">0%</div>
                </div>
            </div>

            <div class="card">
                <div>
                    <h3>Parceiros (Apoio)</h3>
                    <div class="status-text"><span id="txt-parceiros">0</span> / 3</div>
                </div>
                <div>
                    <div class="progress-bar-bg">
                        <div class="progress-fill fill-parceiros" id="bar-parceiros"></div>
                    </div>
                    <div class="percentage" id="perc-parceiros">0%</div>
                </div>
            </div>

            <div class="card">
                <div>
                    <h3>Posts de Divulgação</h3>
                    <div class="status-text"><span id="txt-posts">0</span> / 20</div>
                </div>
                <div>
                    <div class="progress-bar-bg">
                        <div class="progress-fill fill-posts" id="bar-posts"></div>
                    </div>
                    <div class="percentage" id="perc-posts">0%</div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const dadosMetas = {
            ingressos: { atual: 60, total: 100 },
            patrocinadores: { atual: 5, total: 7 },
            parceiros: { atual: 2, total: 3 },
            posts: { atual: 4, total: 20 }
        };

        function atualizarDashboard() {
            for (const [chave, dados] of Object.entries(dadosMetas)) {
                let porcentagem = (dados.atual / dados.total) * 100;
                if (porcentagem > 100) porcentagem = 100;

                document.getElementById(`txt-${chave}`).innerText = dados.atual;
                document.getElementById(`bar-${chave}`).style.width = `${porcentagem}%`;
                document.getElementById(`perc-${chave}`).innerText = `${Math.round(porcentagem)}%`;
            }
        }

        window.onload = atualizarDashboard;
    </script>

</body>
</html>
