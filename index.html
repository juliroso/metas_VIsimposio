<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Metas do Evento</title>
    <style>
        :root {
            --bg-color: #0b0b3b; /* Azul escuro/roxo do jogo */
            --text-color: #ffffff;
            --accent-color: #f39c12; /* Laranja */
            
            /* Cores das barras do dashboard adaptadas para contrastar no escuro */
            --color-ingressos: #3498db;      /* Azul vibrante */
            --color-patrocinadores: #f39c12;  /* Laranja */
            --color-parceiros: #9b59b6;      /* Roxo */
            --color-posts: #1abc9c;          /* Verde menta */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            
            /* PUXANDO O FUNDO DO SEU GITHUB */
            background-image: url('https://github.com/juliroso/metas_VIsimposio/blob/main/irradfundo.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* CONTAINER */
        .container {
            background: rgba(11, 11, 59, 0.95); 
            color: var(--text-color);
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
            
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            max-width: 900px; /* Largura ajustada para o Grid */
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            color: var(--accent-color);
            font-size: 2em;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.9em;
            margin-bottom: 30px;
            color: #ccc;
        }

        /* GRID DOS CARDS DO DASHBOARD */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        /* CARDS ADAPTADOS PARA O AMBIENTE ESCURO */
        .card {
            background: rgba(255, 255, 255, 0.05); /* Fundo semi-transparente sutil */
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-align: left; /* Alinhamento interno dos cards */
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
        }

        .card h3 {
            margin: 0 0 10px 0;
            font-size: 1.1rem;
            color: var(--text-color);
        }

        .status-text {
            font-size: 0.9em;
            color: #ccc;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .status-text span {
            color: var(--accent-color); /* Números atuais ganham o destaque em laranja */
            font-size: 1.1em;
        }

        /* ESTILOS DA BARRA DE PROGRESSO */
        .progress-bar-bg {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            height: 12px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 0%; /* O JS vai animar isso */
            border-radius: 10px;
            transition: width 1s ease-in-out;
        }

        /* CORES INDIVIDUAIS DE CADA BARRA */
        .fill-ingressos { background-color: var(--color-ingressos); }
        .fill-patrocinadores { background-color: var(--color-patrocinadores); }
        .fill-parceiros { background-color: var(--color-parceiros); }
        .fill-posts { background-color: var(--color-posts); }

        .percentage {
            text-align: right;
            font-size: 0.85rem;
            font-weight: bold;
            margin-top: 8px;
            color: var(--text-color);
        }

        /* LOGO DO JOGO NO RODAPÉ */
        .footer-logo {
            margin-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 20px;
        }

        .footer-logo img {
            max-width: 150px;
            height: auto;
            opacity: 0.9;
            transition: opacity 0.3s;
        }
        
        .footer-logo img:hover {
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Painel de Metas do Evento</h1>
    <div class="subtitle">Irradiation - Consultoria em Física Médica</div>
    
    <div class="dashboard-grid">
        
        <!-- Card: Ingressos -->
        <div class="card">
            <div>
                <h3>Venda de Ingressos</h3>
                <div class="status-text"><span id="txt-ingressos">0</span> / 100</div>
            </div>
            <div>
                <div class="progress-bar-bg">
                    <div class="progress-fill fill-ingressos" id="bar-ingressos"></div>
                </div>
                <div class="percentage" id="perc-ingressos">0%</div>
            </div>
        </div>

        <!-- Card: Patrocinadores -->
        <div class="card">
            <div>
                <h3>Patrocinadores</h3>
                <div class="status-text"><span id="txt-patrocinadores">0</span> / 7</div>
            </div>
            <div>
                <div class="progress-bar-bg">
                    <div class="progress-fill fill-patrocinadores" id="bar-patrocinadores"></div>
                </div>
                <div class="percentage" id="perc-patrocinadores">0%</div>
            </div>
        </div>

        <!-- Card: Parceiros -->
        <div class="card">
            <div>
                <h3>Parceiros (Apoio)</h3>
                <div class="status-text"><span id="txt-parceiros">0</span> / 3</div>
            </div>
            <div>
                <div class="progress-bar-bg">
                    <div class="progress-fill fill-parceiros" id="bar-parceiros"></div>
                </div>
                <div class="percentage" id="perc-parceiros">0%</div>
            </div>
        </div>

        <!-- Card: Posts de Divulgação -->
        <div class="card">
            <div>
                <h3>Posts de Divulgação</h3>
                <div class="status-text"><span id="txt-posts">0</span> / 20</div>
            </div>
            <div>
                <div class="progress-bar-bg">
                    <div class="progress-fill fill-posts" id="bar-posts"></div>
                </div>
                <div class="percentage" id="perc-posts">0%</div>
            </div>
        </div>

    </div>

<script>
    // Seus dados das metas 
    const dadosMetas = {
        ingressos: { atual: 13, total: 100 },
        patrocinadores: { atual: 5, total: 7 },
        parceiros: { atual: 2, total: 3 },
        posts: { atual: 4, total: 20 }
    };

    function atualizarDashboard() {
        for (const [chave, dados] of Object.entries(dadosMetas)) {
            let porcentagem = (dados.atual / dados.total) * 100;
            if (porcentagem > 100) porcentagem = 100;

            // Atualiza os números fracionados
            document.getElementById(`txt-${chave}`).innerText = dados.atual;
            
            // Anima as barras de progresso
            document.getElementById(`bar-${chave}`).style.width = `${porcentagem}%`;
            
            // Atualiza a porcentagem impressa
            document.getElementById(`perc-${chave}`).innerText = `${Math.round(porcentagem)}%`;
        }
    }

    // Carrega as animações assim que a página abre
    window.onload = atualizarDashboard;
</script>

</body>
</html>
