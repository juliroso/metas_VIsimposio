<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Metas do Evento</title>
    
    <!-- IMPORTANDO AS FONTES DO EVENTO (Ex: Montserrat para títulos e Inter para textos) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Fontes */
            --font-titulo: 'Montserrat', sans-serif;
            --font-corpo: 'Inter', sans-serif;

            /* Cores de Texto */
            --text-main: #ffffff;      /* Texto principal claro para contrastar com o fundo */
            --text-muted: #cbd5e1;     /* Texto secundário cinza claro */
            --text-dark: #0f172a;      /* Texto escuro dentro dos cards se necessário */
            
            /* Cores dos Progressos (Mais vibrantes para destacar no fundo escuro) */
            --color-ingressos: #38bdf8;       /* Azul brilhante */
            --color-patrocinadores: #fb923c;   /* Laranja caloroso */
            --color-parceiros: #c084fc;       /* Roxo moderno */
            --color-posts: #34d399;           /* Verde menta */
        }

        body {
            font-family: var(--font-corpo);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            box-sizing: border-box;

            /* 1. IMAGEM DE FUNDO COM CAMADA ESCURA (Para dar contraste) */
            background-image: 
                linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(88, 28, 135, 0.8)), 
                url('https://canva.link/2yr44lws8hn3smf');/
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* 2. ÁREA DO LOGO E TÍTULO */
        .header-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 50px;
            text-align: center;
        }

        .logo-irrad {
            max-height: 90px; /* Ajuste o tamanho do seu logo aqui */
            width: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.3)); /* Sombra leve no logo */
        }

        h1 {
            font-family: var(--font-titulo);
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            color: #ffffff;
            margin: 0;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
        }

        /* GRID DOS CARDS */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 24px;
        }

        /* 3. CARDS EFEITO GLASSMORPHISM  */
        .card {
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(16px);           
            -webkit-backdrop-filter: blur(16px);   
            border: 1px solid rgba(255, 255, 255, 0.15); 
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Efeito de hover sutil ao passar o mouse */
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .card h3 {
            font-family: var(--font-titulo);
            margin: 0 0 8px 0;
            font-size: 1.15rem;
            color: #ffffff;
            font-weight: 700;
        }

        .status-text {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            font-weight: 600;
        }

        .status-text span {
            color: #ffffff; /* Destaca o número atual em branco puro */
            font-size: 1.1rem;
        }

        /* CONTAINER DA BARRA DE FUNDO */
        .progress-bar-bg {
            width: 100%;
            height: 10px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        /* PREENCHIMENTO DA BARRA (Com brilho/glow sutil) */
        .progress-fill {
            height: 100%;
            width: 0%;
            border-radius: 10px;
            transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1); /* Animação mais suave */
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
        }

        /* Cores individuais */
        .fill-ingressos { background-color: var(--color-ingressos); }
        .fill-patrocinadores { background-color: var(--color-patrocinadores); }
        .fill-parceiros { background-color: var(--color-parceiros); }
        .fill-posts { background-color: var(--color-posts); }

        .percentage {
            text-align: right;
            font-size: 0.85rem;
            font-weight: 700;
            margin-top: 8px;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- HEADER COM LOGO E TÍTULO -->
        <header class="header-container">
            <img class="logo-irrad" src="https://via.placeholder.com/180x80/ffffff/000000?text=LOGO+IRRAD" alt="Logo IRRAD">
            <h1>Painel de Metas do Evento</h1>
        </header>
        
        <div class="dashboard-grid">
            
            <!-- Card: Ingressos -->
            <div class="card">
                <div>
                    <h3>Venda de Ingressos</h3>
                    <div class="status-text"><span id="txt-ingressos">0</span> / 100</div>
                </div>
                <div>
                    <div class="progress-bar-bg">
                        <div class="progress-fill fill-ingressos" id="bar-ingressos" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
                    </div>
                    <div class="percentage" id="perc-ingressos">0%</div>
                </div>
            </div>

            <!-- Card: Patrocinadores -->
            <div class="card">
                <div>
                    <h3>Patrocinadores</h3>
                    <div class="status-text"><span id="txt-patrocinadores">0</span> / 7</div>
                </div>
                <div>
                    <div class="progress-bar-bg">
                        <div class="progress-fill fill-patrocinadores" id="bar-patrocinadores" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
                    </div>
                    <div class="percentage" id="perc-patrocinadores">0%</div>
                </div>
            </div>

            <!-- Card: Parceiros -->
            <div class="card">
                <div>
                    <h3>Parceiros</h3>
                    <div class="status-text"><span id="txt-parceiros">0</span> / 3</div>
                </div>
                <div>
                    <div class="progress-bar-bg">
                        <div class="progress-fill fill-parceiros" id="bar-parceiros" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
                    </div>
                    <div class="percentage" id="perc-parceiros">0%</div>
                </div>
            </div>

            <!-- Card: Posts -->
            <div class="card">
                <div>
                    <h3>Posts de Divulgação</h3>
                    <div class="status-text"><span id="txt-posts">0</span> / 20</div>
                </div>
                <div>
                    <div class="progress-bar-bg">
                        <div class="progress-fill fill-posts" id="bar-posts" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
                    </div>
                    <div class="percentage" id="perc-posts">0%</div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const dadosMetas = {
            ingressos: { atual: 60, total: 100 },
            patrocinadores: { atual: 5, total: 7 },
            parceiros: { atual: 2, total: 3 },
            posts: { atual: 4, total: 20 }
        };

        function atualizarDashboard() {
            for (const [chave, dados] of Object.entries(dadosMetas)) {
                const totalValido = dados.total > 0 ? dados.total : 1;
                let porcentagem = (dados.atual / totalValido) * 100;
                
                porcentagem = Math.min(Math.max(porcentagem, 0), 100);
                const porcentagemArredondada = Math.round(porcentagem);

                const txtElement = document.getElementById(`txt-${chave}`);
                const barElement = document.getElementById(`bar-${chave}`);
                const percElement = document.getElementById(`perc-${chave}`);

                if (txtElement && barElement && percElement) {
                    txtElement.innerText = dados.atual;
                    barElement.style.width = `${porcentagem}%`;
                    barElement.setAttribute('aria-valuenow', porcentagemArredondada);
                    percElement.innerText = `${porcentagemArredondada}%`;
                }
            }
        }

        document.addEventListener('DOMContentLoaded', atualizarDashboard);
    </script>

</body>
</html>
