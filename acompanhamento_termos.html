<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acompanhamento de Termos e Contratos</title>
    <style>
        :root {
            /* Cores puxadas da identidade visual */
            --bg-color: #0b0b3b; 
            --text-color: #ffffff;
            --accent-color: #f39c12; /* Laranja */
            --success-color: #2ecc71; /* Verde para itens concluídos */
            --card-bg: rgba(11, 11, 59, 0.85);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            background-image: url('Poppins Semibold - Títulos (1920 x 1810 px).png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--card-border);
            position: relative;
        }

        h1 {
            color: var(--accent-color);
            font-size: 2.2em;
            margin: 0 0 5px 0;
        }

        .subtitle {
            font-size: 1em;
            color: #ccc;
        }

        .btn-voltar {
            position: absolute;
            top: 30px;
            left: 30px;
            color: var(--accent-color);
            text-decoration: none;
            font-weight: bold;
            border: 1px solid var(--accent-color);
            padding: 8px 15px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .btn-voltar:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
        }

        /* Títulos das seções */
        .section-title {
            font-size: 1.8em;
            color: #ffffff;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
            margin: 40px 0 20px 0;
            display: inline-block;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--card-border);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
        }

        /* Estilo para destacar o card quando está 100% concluído */
        .card.concluido {
            border-color: var(--success-color);
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.2);
        }

        .card h3 {
            margin: 0 0 15px 0;
            font-size: 1.2rem;
            color: var(--accent-color);
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 10px;
        }

        /* Barra de progresso individual dentro do card */
        .mini-progress-bg {
            width: 100%;
            height: 6px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .mini-progress-fill {
            height: 100%;
            width: 0%;
            background-color: var(--success-color);
            border-radius: 5px;
            transition: width 0.4s ease;
        }

        /* Lista de Checkboxes */
        .checklist {
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
        }

        .checklist li {
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .checklist label {
            display: flex;
            align-items: center;
            cursor: pointer;
            color: #ddd;
            transition: color 0.2s;
        }

        .checklist label:hover {
            color: #fff;
        }

        .checklist input[type="checkbox"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--success-color); /* Pinta a caixinha de verde quando marcada */
        }

        /* Riscar o texto quando marcado */
        .checklist input[type="checkbox"]:checked + span {
            text-decoration: line-through;
            color: var(--success-color);
            opacity: 0.8;
        }

    </style>
</head>
<body>

    <div class="container">
        
        <div class="header">
            <!-- Coloque o link real do seu painel principal no href abaixo -->
            <a href="index.html" class="btn-voltar">← Voltar ao Painel</a>
            <h1>Acompanhamento de Burocracia</h1>
            <div class="subtitle">Irradiation - Termos e Contratos</div>
        </div>

        <!-- SEÇÃO 1: PALESTRANTES -->
        <h2 class="section-title">🎙️ Termos dos Palestrantes</h2>
        <div class="dashboard-grid" id="grid-palestrantes">
            <!-- Os cards dos palestrantes serão injetados aqui via JavaScript -->
        </div>

        <!-- SEÇÃO 2: PATROCINADORES -->
        <h2 class="section-title">🤝 Contratos de Patrocínio</h2>
        <div class="dashboard-grid" id="grid-patrocinadores">
            <!-- Os cards dos patrocinadores serão injetados aqui via JavaScript -->
        </div>

    </div>

    <script>
        // 1. LISTA DE NOMES (Você pode alterar os nomes reais aqui quando quiser)
        const palestrantes = [
            "Diego Mansano", "Dani Estácio", "DR Izabella Barreto", 
            "Isabela Veiga", "Laura Deringoski", "Fábio Lunelli", 
            "Física Elekta", "Prophy", "Palestrante Vaga"
        ];

        const patrocinadores = [
            "OmegaRad - deluxe", "Escla - premium", "Tabuada - premium ", 
            "Medical ald - deluxe", "Totalrad super - premium", "SPIN - premium", 
            "Patrocinador 7"
        ];

        // 2. TAREFAS DE CADA CATEGORIA
        const tarefasPalestrante = [
            { id: "dados", label: "Dados recebidos" },
            { id: "termoComp", label: "T. de Compromisso pronto" },
            { id: "termoImg", label: "T. de Imagem pronto" },
            { id: "enviado", label: "Enviado ao palestrante" },
            { id: "assinado", label: "Assinado e devolvido" }
        ];

        const tarefasPatrocinador = [
            { id: "dados", label: "Dados para contrato recebidos" },
            { id: "contrato", label: "Contrato pronto" },
            { id: "enviado", label: "Enviado ao patrocinador" },
            { id: "assinado", label: "Contrato assinado e devolvido" }
        ];

        // 3. FUNÇÃO PARA CRIAR OS CARDS NA TELA
        function renderCards(lista, tarefas, containerId, prefixo) {
            const container = document.getElementById(containerId);
            container.innerHTML = "";

            lista.forEach((nome, index) => {
                const cardId = `${prefixo}-${index}`;
                
                // Cria a estrutura HTML do Card
                let html = `
                    <div class="card" id="card-${cardId}">
                        <h3>${nome}</h3>
                        <div class="mini-progress-bg">
                            <div class="mini-progress-fill" id="bar-${cardId}"></div>
                        </div>
                        <ul class="checklist">
                `;

                // Cria os Checkboxes
                tarefas.forEach(tarefa => {
                    const checkboxId = `${cardId}-${tarefa.id}`;
                    html += `
                        <li>
                            <label>
                                <input type="checkbox" id="${checkboxId}" onchange="atualizarProgresso('${cardId}', ${tarefas.length})">
                                <span>${tarefa.label}</span>
                            </label>
                        </li>
                    `;
                });

                html += `</ul></div>`;
                container.innerHTML += html;
            });
        }

        // 4. FUNÇÃO PARA ATUALIZAR A BARRA E SALVAR NO NAVEGADOR
        function atualizarProgresso(cardId, totalTarefas) {
            const card = document.getElementById(`card-${cardId}`);
            const checkboxes = card.querySelectorAll('input[type="checkbox"]');
            
            let marcados = 0;
            const estadoSalvar = {};

            checkboxes.forEach(cb => {
                if (cb.checked) marcados++;
                estadoSalvar[cb.id] = cb.checked; // Prepara para salvar
            });

            // Atualiza a barrinha verde
            const porcentagem = (marcados / totalTarefas) * 100;
            document.getElementById(`bar-${cardId}`).style.width = `${porcentagem}%`;

            // Se chegou em 100%, pinta a borda do card
            if (porcentagem === 100) {
                card.classList.add("concluido");
            } else {
                card.classList.remove("concluido");
            }

            // Salva no LocalStorage (Memória do Navegador)
            localStorage.setItem(`status-${cardId}`, JSON.stringify(estadoSalvar));
        }

        // 5. FUNÇÃO PARA CARREGAR OS DADOS SALVOS QUANDO ABRIR A PÁGINA
        function carregarSalvos() {
            // Varre todos os inputs de checkbox da página
            const todosCheckboxes = document.querySelectorAll('input[type="checkbox"]');
            
            todosCheckboxes.forEach(cb => {
                // Pega o prefixo do card (ex: palestrante-0) isolando o ID
                const cardId = cb.id.split('-').slice(0, 2).join('-'); 
                const salvos = JSON.parse(localStorage.getItem(`status-${cardId}`));
                
                if (salvos && salvos[cb.id]) {
                    cb.checked = true;
                }
            });

            // Atualiza as barras de progresso de todos os palestrantes
            palestrantes.forEach((_, i) => atualizarProgresso(`palestrante-${i}`, tarefasPalestrante.length));
            
            // Atualiza as barras de progresso de todos os patrocinadores
            patrocinadores.forEach((_, i) => atualizarProgresso(`patrocinador-${i}`, tarefasPatrocinador.length));
        }

        // INICIALIZAÇÃO DO SCRIPT
        window.onload = () => {
            // Desenha os 9 palestrantes e 7 patrocinadores
            renderCards(palestrantes, tarefasPalestrante, "grid-palestrantes", "palestrante");
            renderCards(patrocinadores, tarefasPatrocinador, "grid-patrocinadores", "patrocinador");
            
            // Puxa da memória o que já foi ticado
            carregarSalvos();
        };
    </script>

</body>
</html>
